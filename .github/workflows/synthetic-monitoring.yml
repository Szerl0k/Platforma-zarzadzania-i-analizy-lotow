name: AeroAPI Synthetic Monitoring

on:
  schedule:
    # Runs at 08:00 and 20:00 CET
    - cron: '0 7,19 * * *'
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-22.04

    steps:
      - name: Download repo
        uses: actions/checkout@v4

      - name: Configure Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run AeroAPI smoke test
        working-directory: ./backend
        env:
          AEROAPI_SMOKE_TEST_KEY: ${{ secrets.AEROAPI_SMOKE_TEST_KEY }}
        run: npx ts-node scripts/smoke-test-aeroapi.ts

      - name: Run OpenSky Network API smoke test
        working-directory: ./backend
        env:
          OPENSKY_CLIENT_ID_SMOKE_TEST: ${{ secrets.OPENSKY_CLIENT_ID_SMOKE_TEST}}
          OPENSKY_CLIENT_SECRET_SMOKE_TEST: ${{ secrets.OPENSKY_CLIENT_SECRET_SMOKE_TEST}}
        run: npx ts-node scripts/smoke-test-opensky.ts

      - name: Failure notification
        if: failure()
        run: echo "AeroAPI smoke test failed"