name: ci-validation.yml
on:
  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"


jobs:

  # DB Schema validation
  database-ci:
    name: Database Migration Dry Run
    runs-on: ubuntu-22.04
    services:
      postgis:
        image: postgis/postgis:16-3.5-alpine
        env:
          POSTGRES_USER: ci_tester
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_flight_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Migrations
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ci_tester
          DB_PASSWORD: ci_password
          DB_NAME: ci_flight_db

        run: npm run ci:migrate

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Check Types
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Linting
        working-directory: ./backend
        run: npm run lint

      - name: Formatting check
        working-directory: ./backend
        run: npm run format:check

      - name: Format Failure Message
        if: failure()
        run: |
          echo "::error title=Formatting Check Failed:: run 'npm run format' and update the PR."
          exit 1


  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Linting
        working-directory: ./frontend
        run: npm run lint

      - name: Formatting check
        working-directory: ./frontend
        run: npm run format:check

      - name: Format Failure Message
        if: failure()
        run: |
          echo "::error title=Formatting Check Failed:: run 'npm run format' and update the PR."
          exit 1

      - name: Next.js Build (validation)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3000"
        run: npm run build

  infra-ci:
    name: Infrastructure Validation
    runs-on: ubuntu-22.04
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        working-directory: ./infrastructure/terraform/azure
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Plan
        working-directory: ./infrastructure/terraform/azure
        run: |
          terraform init -upgrade
          terraform plan -lock=false
          
